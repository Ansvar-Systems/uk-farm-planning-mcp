      scope: "Agricultural tax rules, APR guidance, MTD, capital allowances, farmers averaging"
      version: "current as of April 2026"
      item_count: "~18 rules/scenarios"
    languages:
      - "en"

  - name: "UK Legislation (AHA 1986 / ATA 1995)"
    authority: "The National Archives"
    official_url: "https://www.legislation.gov.uk"
    api_url: null
    retrieval_method: "MANUAL_EXTRACT"
    format: "HTML"
