schema_version: "1.0"
mcp_name: "UK Farm Planning MCP"
category: "domain_intelligence"

sources:
  - name: "AHDB Farmbench / Pocketbook"
    authority: "Agriculture and Horticulture Development Board"
    official_url: "https://ahdb.org.uk/farmbench"
    api_url: null
    retrieval_method: "MANUAL_EXTRACT"
    format: "PDF/HTML"
    authentication: "none"
    update_frequency: "annual"
    license:
      type: "Open Government Licence"
      url: "https://www.nationalarchives.gov.uk/doc/open-government-licence/version/3/"
      summary: "Free to copy, publish, distribute, and adapt with attribution"
    coverage:
      scope: "Gross margins for arable and livestock enterprises, benchmarking quartiles"
      version: "2024/25 estimates"
      item_count: "~13 enterprise types"
    languages:
      - "en"

  - name: "HMRC Manuals and Guidance"
    authority: "HM Revenue & Customs"
    official_url: "https://www.gov.uk/hmrc-internal-manuals"
    api_url: null
    retrieval_method: "MANUAL_EXTRACT"
    format: "HTML"
    authentication: "none"
    update_frequency: "ongoing"
    license:
      type: "Open Government Licence"
      url: "https://www.nationalarchives.gov.uk/doc/open-government-licence/version/3/"
      summary: "Free to copy, publish, distribute, and adapt with attribution"
